<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Test</title>
<style>
body{background:#050510;color:#0ff;font-family:sans-serif;padding:20px}
button{padding:10px 20px;background:#0ff;color:#000;border:none;cursor:pointer;margin:5px}
#log{margin-top:20px;padding:10px;background:#111;min-height:100px;white-space:pre-wrap}
</style></head>
<body>
<h1>OWL Chat Test</h1>
<button id="btn1">Добавь босса</button>
<button id="btn2">Дай кредитов</button>
<button id="btn3">Привет</button>
<div id="log"></div>
<script>
function log(msg){
  document.getElementById('log').textContent+=msg+"\n";
}
document.getElementById('btn1').onclick=function(){
  log("✅ Босс создан!\n👹 Пустотный Владыка\n❤️ HP: 50,000\n💰 Награда: 20,000💎\nВсего боссов: 9");
};
document.getElementById('btn2').onclick=function(){
  log("💰 Начислено 1500 кредитов!\nБаланс: 1500💎");
};
document.getElementById('btn3').onclick=function(){
  log("👋 Привет, Tester!\nЯ — OWL 🦉, ИИ-разработчик.\n\n📌 Команды:\n• Добавй босса\n• Дай кредитов\n• Исправь баги");
};
log("Page loaded OK. JS is working.");
</script>
</body>
</html>
